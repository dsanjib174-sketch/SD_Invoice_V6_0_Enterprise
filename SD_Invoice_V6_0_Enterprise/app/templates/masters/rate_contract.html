{% extends "base.html" %}
{% block content %}
<section>
<h2>Rate Contract</h2>
<form class="grid">
<div class="doc-section-title">Customer / Vendor Details</div>
<input placeholder="Customer / Vendor Name"><input placeholder="GSTIN"><input placeholder="PAN"><input placeholder="State">
<div class="doc-section-title">Rate Details</div>
<input placeholder="Item / Service"><input placeholder="HSN/SAC"><input placeholder="UOM"><input placeholder="Contract Rate">
<input placeholder="GST %"><input type="date" placeholder="Valid From"><input type="date" placeholder="Valid To">
<textarea placeholder="Terms"></textarea><button type="button">Save Rate Contract</button>
</form>
<table><tr><th>Customer</th><th>Item</th><th>HSN/SAC</th><th>Rate</th><th>GST</th><th>Validity</th></tr><tr><td colspan="6">No rate contracts yet.</td></tr></table>
</section>
{% endblock %}
